name: IPFS 2

on: workflow_dispatch
#on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
  
    - name: Setup Node
      uses: actions/setup-node@v1
      with:
        node-version: '10.x'
  
    - run: npm ci
  
    - run: npm run build

    - uses: aquiladev/ipfs-action@v0.1.1
      id: upload
      with:
        path: ./build
